<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidéos — Mickaz9</title>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/ddj8pfqti/image/upload/v1777570083/Logo-mickaz9.-blanc_mlty4s.png">
<meta name="theme-color" content="#ff2d2d">
<link rel="preconnect" href="https://use.typekit.net">
<link rel="stylesheet" href="https://use.typekit.net/dxb6efn.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#080808;
  --white:#f0ede6;
  --accent:#ff2d2d;
  --muted:#4a4a4a;
  --border:rgba(240,237,230,0.08);
  --twitch:#9146ff;
  --youtube:#ff2d2d;
  --discord:#5865f2;
}
html{scroll-behavior:smooth}
body{
  font-family:"transducer",sans-serif;
  font-style:italic;
  font-weight:600;
  background:var(--black);
  color:var(--white);
  overflow-x:hidden;
  cursor:none;
}
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(255,45,45,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 0% 50%, rgba(255,45,45,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 100% 50%, rgba(255,45,45,0.04) 0%, transparent 60%);
}
/* CURSOR */
.cursor{
  position:fixed;width:10px;height:10px;
  background:var(--accent);border-radius:50%;
  pointer-events:none;z-index:9999;
  transition:transform 0.1s;mix-blend-mode:difference;
}
.cursor-follower{
  position:fixed;width:36px;height:36px;
  border:1px solid rgba(255,45,45,0.3);border-radius:50%;
  pointer-events:none;z-index:9998;
  transition:transform 0.25s ease, width 0.2s, height 0.2s;mix-blend-mode:difference;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 3rem;
  background:rgba(8,8,8,0.45);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1px solid rgba(240,237,230,0.06);
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
}
.nav-logo{
  font-family:"transducer-extended",sans-serif;font-style:italic;font-weight:600;
  font-size:1.6rem;letter-spacing:3px;
  color:var(--white);text-decoration:none;
}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2.5rem;list-style:none;align-items:center}
.nav-links li{display:flex;align-items:center}
.nav-links a{
  font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;
  color:rgba(240,237,230,0.5);text-decoration:none;
  transition:color 0.2s;font-weight:600;line-height:1;display:flex;align-items:center;
}
.nav-links a:hover{color:var(--accent)}

/* NAV DROPDOWN */
.nav-dropdown{position:relative;}
.nav-dropdown-btn{
  appearance:none;-webkit-appearance:none;-moz-appearance:none;
  font:inherit;
  font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;
  color:rgba(240,237,230,0.5);background:none;border:none;outline:none;cursor:pointer;
  font-weight:600;font-family:"transducer",sans-serif;
  display:flex;align-items:center;gap:6px;padding:0;margin:0;
  line-height:1;-webkit-font-smoothing:antialiased;
  transition:color 0.2s;
}
.nav-dropdown-btn:hover{color:var(--accent)}
.nav-dropdown-btn svg{transition:transform 0.2s;}
.nav-dropdown.open .nav-dropdown-btn{color:var(--white)}
.nav-dropdown.open .nav-dropdown-btn svg{transform:rotate(180deg)}
.nav-dropdown-menu{
  position:absolute;top:calc(100% + 14px);left:50%;transform:translateX(-50%);
  background:rgba(8,8,8,0.7);
  backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);
  border:1px solid rgba(240,237,230,0.1);
  border-radius:18px;
  padding:6px;
  min-width:160px;
  display:flex;flex-direction:column;gap:2px;
  opacity:0;pointer-events:none;
  transform:translateX(-50%) translateY(-6px);
  transition:opacity 0.18s ease,transform 0.18s ease;
  z-index:200;
  box-shadow:0 16px 40px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06);
}
.nav-dropdown-menu::before{
  content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  width:8px;height:8px;
  background:rgba(8,8,8,0.92);
  border-left:1px solid rgba(240,237,230,0.08);
  border-top:1px solid rgba(240,237,230,0.08);
  transform:translateX(-50%) rotate(45deg);
}
.nav-dropdown.open .nav-dropdown-menu{
  opacity:1;pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}
.nav-dropdown-menu a{
  font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;
  color:rgba(240,237,230,0.45);text-decoration:none;font-weight:600;
  padding:0.55rem 1rem;border-radius:12px;
  transition:background 0.15s,color 0.15s;
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;
}
.nav-dropdown-menu a::before{
  content:'';width:3px;height:3px;border-radius:50%;
  background:var(--accent);opacity:0;flex-shrink:0;
  transition:opacity 0.15s;
}
.nav-dropdown-menu a:hover{
  background:rgba(255,45,45,0.06);
  color:var(--white);
}
.nav-dropdown-menu a:hover::before{opacity:1;}

/* HERO */
.hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 30%, rgba(255,45,45,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,45,45,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 30% 30% at 80% 70%, rgba(180,20,20,0.06) 0%, transparent 60%);
}
.hero-noise{
  position:absolute;inset:0;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px;
}
.hero-content{
  position:relative;z-index:2;
  text-align:center;padding:0 2rem;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:0.68rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(240,237,230,0.4);margin-bottom:2rem;
  font-family:'DM Mono',monospace;
}
.hero-eyebrow::before,
.hero-eyebrow::after{content:'';flex:1;height:1px;width:40px;background:rgba(240,237,230,0.15)}
.live-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,45,45,0.08);border:1px solid rgba(255,45,45,0.2);
  padding:4px 12px;border-radius:20px;
  font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent);margin-bottom:1.5rem;font-family:'DM Mono',monospace;
}
.live-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 25px rgba(255,45,45,0.6)) drop-shadow(0 0 70px rgba(255,45,45,0.25))}50%{filter:drop-shadow(0 0 50px rgba(255,45,45,1)) drop-shadow(0 0 130px rgba(255,45,45,0.5))}}.logo-glow-bg{position:absolute;inset:-40px;background:radial-gradient(ellipse 70% 70% at 50% 50%,rgba(255,45,45,0.55) 0%,transparent 70%);filter:blur(20px);animation:logoGlow 2.5s ease-in-out infinite;pointer-events:none;transform:translateZ(0);z-index:0;}
h1{
  font-family:"transducer-extended",sans-serif;font-style:italic;font-weight:600;
  font-size:clamp(5rem,14vw,13rem);
  line-height:0.88;letter-spacing:-1px;
  margin-bottom:1.5rem;
}
h1 .outline{
  -webkit-text-stroke:1px rgba(240,237,230,0.25);
  color:transparent;
}
h1 .accent{color:var(--accent)}
.hero-sub{
  font-size:0.95rem;color:rgba(240,237,230,0.45);
  max-width:400px;margin:0 auto 3rem;line-height:1.8;
  font-weight:600;
}
.hero-ctas{display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:0.85rem 2rem;border-radius:50px;
  font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;
  font-weight:600;text-decoration:none;transition:all 0.2s;
  font-family:"transducer",sans-serif;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.btn-primary{
  background:rgba(255,45,45,0.75);
  color:#ffffff;
  border:1px solid rgba(255,120,120,0.35);
  box-shadow:0 8px 28px rgba(255,45,45,0.3),inset 0 1px 0 rgba(255,255,255,0.25),inset 0 -1px 0 rgba(0,0,0,0.1);
}
.btn-primary:hover{background:rgba(255,45,45,0.9);transform:translateY(-2px);box-shadow:0 10px 36px rgba(255,45,45,0.45),inset 0 1px 0 rgba(255,255,255,0.3);}
.btn-ghost{
  background:rgba(240,237,230,0.06);
  border:1px solid rgba(240,237,230,0.14);
  color:rgba(240,237,230,0.75);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
}
.btn-ghost:hover{background:rgba(240,237,230,0.12);border-color:rgba(240,237,230,0.28);color:var(--white);}
.hero-scroll{
  position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:rgba(240,237,230,0.2);font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;
  font-family:'DM Mono',monospace;
  animation:float 2s infinite ease-in-out;
}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--accent),transparent)}

/* MARQUEE */
.marquee-wrap{
  overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:1rem 0;background:rgba(240,237,230,0.015);
}
.marquee-track{
  display:flex;gap:3rem;white-space:nowrap;
  animation:marquee 18s linear infinite;
}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-item{
  font-family:"transducer-extended",sans-serif;font-style:italic;font-weight:600;font-size:1.1rem;letter-spacing:4px;
  color:rgba(240,237,230,0.12);text-transform:uppercase;
}
.marquee-item.accent{color:var(--accent);opacity:0.5}

/* SECTIONS */
section{padding:6rem 3rem;max-width:1100px;margin:0 auto}
/* Sections accordéon : padding réduit quand fermé */

/* ── Skeleton loading ── */
@keyframes shimmer{
  0%{background-position:-400px 0}
  100%{background-position:400px 0}
}
.skeleton{
  background:linear-gradient(90deg,rgba(240,237,230,0.04) 25%,rgba(240,237,230,0.08) 50%,rgba(240,237,230,0.04) 75%);
  background-size:800px 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}
.setup-skeleton-card{
  background:rgba(240,237,230,0.03);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(240,237,230,0.08);
  border-radius:20px;
  overflow:hidden;
  display:flex;flex-direction:column;
}
.setup-skeleton-img{aspect-ratio:1/1;margin:1.2rem;}
.setup-skeleton-title{height:14px;margin:0 1.2rem 0.6rem;border-radius:4px;}
.setup-skeleton-btn{height:10px;width:60%;margin:0 1.2rem 1.2rem;border-radius:4px;}
#derniere-video, #setup, #reseaux{
  padding-top:2.5rem;padding-bottom:2.5rem;
  transition:padding 0.3s ease;
}
.section-label{
  font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);font-family:'DM Mono',monospace;
  display:flex;align-items:center;gap:10px;margin-bottom:1rem;
}
.section-label::after{content:'';flex:1;max-width:40px;height:1px;background:var(--accent);opacity:0.4}
.section-title{
  font-family:"transducer-extended",sans-serif;font-style:italic;font-weight:600;
  font-size:clamp(2.2rem,4.5vw,4rem);line-height:0.9;
  letter-spacing:-1px;margin-bottom:3rem;
}
.section-title .dim{color:rgba(240,237,230,0.15)}

/* LIVE STATUS */
.live-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.live-card{
  background:rgba(240,237,230,0.04);
  backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
  padding:2.5rem;
  display:flex;flex-direction:column;gap:1.5rem;
  transition:all 0.25s cubic-bezier(.25,.8,.25,1);position:relative;overflow:hidden;
  border-radius:24px;
  border:1px solid rgba(240,237,230,0.08);
  box-shadow:0 8px 32px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.06);
}
.live-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--accent),transparent);
  opacity:0;transition:opacity 0.3s;
}
.live-card:hover{background:rgba(240,237,230,0.06);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08);}
.live-card:hover::before{opacity:1}
.platform-row{display:flex;align-items:center;justify-content:space-between}
.platform-badge{
  display:flex;align-items:center;gap:8px;
  font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;
  font-family:'DM Mono',monospace;color:rgba(240,237,230,0.35);
}
.platform-icon{
  width:28px;height:28px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.25);
}
.pi-twitch{background:var(--twitch)}
.pi-youtube{background:var(--youtube)}
.status-badge{
  font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;
  font-family:'DM Mono',monospace;padding:5px 12px;border-radius:20px;
  backdrop-filter:blur(10px);display:flex;align-items:center;gap:6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
}
.status-live{
  background:rgba(0,200,80,0.1);color:#00c850;
  border:1px solid rgba(0,200,80,0.3);
  box-shadow:0 0 10px rgba(0,200,80,0.2);
  animation:glowBadge 1.5s ease-in-out infinite;
}
@keyframes glowBadge{
  0%,100%{box-shadow:0 0 8px rgba(0,200,80,0.2);border-color:rgba(0,200,80,0.3);}
  50%{box-shadow:0 0 20px rgba(0,200,80,0.5);border-color:rgba(0,200,80,0.6);}
}
.status-live::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:#00c850;flex-shrink:0;
  animation:dotPulse 1.5s ease-in-out infinite;
}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
.status-offline{background:rgba(240,237,230,0.03);color:rgba(240,237,230,0.15);border:1px solid rgba(240,237,230,0.06);}
.live-title{font-size:1.15rem;font-weight:600;line-height:1.4}
.live-meta{font-size:0.75rem;color:rgba(240,237,230,0.3);font-family:'DM Mono',monospace}
.live-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.68rem;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--accent);text-decoration:none;font-weight:600;
  transition:gap 0.2s,transform 0.2s;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.live-link:hover{gap:10px;transform:translateY(-1px)}
.arrow{display:inline-block}

/* VIDEOS */
.videos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.video-card{
  background:var(--black);
  display:flex;flex-direction:column;
  transition:background 0.2s;cursor:pointer;text-decoration:none;color:inherit;
}
.video-card:hover{background:rgba(240,237,230,0.02)}
.video-thumb{
  aspect-ratio:16/9;
  background:#111;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.thumb-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#0d0d1a 0%,#1a0d0d 100%);
}
.play-ring{
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(240,237,230,0.15);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
  transition:border-color 0.2s,transform 0.2s;
}
.video-card:hover .play-ring{border-color:var(--accent);transform:scale(1.1)}
.play-tri{
  width:0;height:0;
  border-top:7px solid transparent;border-bottom:7px solid transparent;
  border-left:12px solid rgba(240,237,230,0.6);
  margin-left:3px;
}
.video-card:hover .play-tri{border-left-color:var(--accent)}
.vid-type{
  position:absolute;bottom:8px;left:8px;z-index:1;
  font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;
  font-family:'DM Mono',monospace;padding:2px 6px;border-radius:2px;font-weight:600;
}
.vt-long{background:rgba(255,45,45,0.15);color:#ff7070;border:1px solid rgba(255,45,45,0.2)}
.vt-short{background:rgba(255,45,45,0.1);color:var(--accent);border:1px solid rgba(255,45,45,0.15)}
.video-info{padding:1.25rem 1.5rem}
.video-info strong{font-size:0.9rem;font-weight:600;display:block;margin-bottom:6px;line-height:1.4}
.video-info span{font-size:0.7rem;color:rgba(240,237,230,0.3);font-family:'DM Mono',monospace}

/* NETWORKS */
.networks-wrap{display:flex;flex-direction:column;border:1px solid rgba(240,237,230,0.08);border-radius:22px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.network-item{
  background:rgba(240,237,230,0.03);
  backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);
  padding:1.25rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  text-decoration:none;color:inherit;
  transition:all 0.2s cubic-bezier(.25,.8,.25,1);
  position:relative;overflow:hidden;
  border-bottom:1px solid rgba(240,237,230,0.06);
}
.network-item:last-child{border-bottom:none;}
.network-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--accent);opacity:0;transition:opacity 0.2s;
}
.network-item:hover::before{opacity:1;}
.network-item:hover{background:rgba(240,237,230,0.07);}
.net-left{display:flex;align-items:center;gap:16px;flex:1;}
.net-icon{
  width:36px;height:36px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);
}
.net-name{font-family:"transducer-extended",sans-serif;font-style:italic;font-weight:600;font-size:1.1rem;letter-spacing:2px;display:block;margin-bottom:2px;}
.net-handle{font-size:0.68rem;color:rgba(240,237,230,0.3);font-family:'DM Mono',monospace;}
.net-stats{font-size:1.2rem;color:var(--white);font-family:"transducer-extended",sans-serif;font-style:italic;font-weight:600;letter-spacing:2px;min-width:60px;text-align:right;margin-right:1.5rem;}
.net-arrow{font-size:1rem;color:rgba(240,237,230,0.15);transition:color 0.2s,transform 0.2s;flex-shrink:0;}
.network-item:hover .net-arrow{color:var(--accent);transform:translate(2px,-2px);}

/* CALENDAR */
.calendar-wrap{
  border:1px solid rgba(240,237,230,0.08);
  border-radius:22px;
  overflow:hidden;
  backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%);
  background:rgba(240,237,230,0.03);
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}
.cal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.5rem 2rem;border-bottom:1px solid var(--border);
}
.cal-head strong{font-size:0.85rem;font-weight:600}
.cal-head span{font-size:0.7rem;color:rgba(240,237,230,0.3);font-family:'DM Mono',monospace}
.cal-body{padding:1.5rem 2rem;display:flex;flex-direction:column;gap:10px}
.cal-row{
  display:flex;align-items:center;gap:16px;
  padding:1rem 1.25rem;background:rgba(240,237,230,0.03);
  border:1px solid var(--border);border-radius:16px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);

<script>

const cursor = document.getElementById('cursor');
const follower = document.getElementById('follower');
let mx=0,my=0,fx=0,fy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=(mx-5)+'px';cursor.style.top=(my-5)+'px';});
(function animFollower(){fx+=(mx-fx)*0.12;fy+=(my-fy)*0.12;follower.style.left=(fx-18)+'px';follower.style.top=(fy-18)+'px';requestAnimationFrame(animFollower);})();
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>{follower.style.width='52px';follower.style.height='52px';});el.addEventListener('mouseleave',()=>{follower.style.width='36px';follower.style.height='36px';});});
const observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')});},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
(function(){
  const page=window.location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.nav-links a,.nav-mobile-menu a').forEach(a=>{if(a.getAttribute('href')===page){a.style.color='var(--accent)';}});
})();
(function(){
  const burger=document.getElementById('nav-burger');
  const menu=document.getElementById('nav-mobile-menu');
  if(!burger||!menu)return;
  burger.addEventListener('click',()=>{menu.classList.toggle('open');burger.classList.toggle('open');});
  menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{menu.classList.remove('open');burger.classList.remove('open');}));
})();

// Twitch live check
async function checkTwitch(){
  try{
    const fmtN=n=>{if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return Math.round(n/1000)+'K';return n;};
    const r=await fetch('/twitch');
    const d=await r.json();
    if(d.data&&d.data.length>0){
      const s=d.data[0];
      const badge=document.getElementById('twitch-status-badge');
      badge.textContent='En stream';badge.className='status-badge status-live';
      document.getElementById('twitch-title').textContent=s.title;
      document.getElementById('twitch-meta').textContent=s.viewer_count.toLocaleString()+' spectateurs';
      document.getElementById('hero-live').style.display='inline-flex';
      document.getElementById('hero-ctas-offline').style.display='none';
      document.getElementById('hero-ctas-live').style.display='flex';
    }
    if(d.followers!=null){
      const el=document.getElementById('twitch-subs');
      if(el)el.textContent=fmtN(d.followers);
    }
    if(d.lastClip){
      const c=d.lastClip;
      const container=document.getElementById('last-clip-container');
      if(container) container.style.display='flex';
      const link=document.getElementById('last-clip-link');
      const btn=document.getElementById('last-clip-btn');
      const thumb=document.getElementById('last-clip-thumb');
      const title=document.getElementById('last-clip-title');
      const meta=document.getElementById('last-clip-meta');
      if(link) link.href=c.url;
      if(btn) btn.href=c.url;
      if(thumb) thumb.style.backgroundImage='url('+c.thumbnail+')';
      if(title) title.textContent=c.title;
      const views=c.views>=1000?Math.round(c.views/1000)+'K vues':c.views+' vues';
      const date=new Date(c.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
      if(meta) meta.textContent=views+' · '+date;
    }
  }catch(e){console.error('Twitch error',e);}
}

async function loadYT(){
  const CACHE_KEY='mickaz9_yt_cache_v2';
  const CACHE_TTL=3600000; // 1 heure
  try{
    // Supprimer l'ancien cache si présent
    localStorage.removeItem('mickaz9_yt_cache');
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      const {data,timestamp,videoId}=JSON.parse(cached);
      // Invalider le cache si la vidéo a changé dans le CONFIG
      if(videoId===CONFIG.LATEST_VIDEO_ID && Date.now()-timestamp<CACHE_TTL){applyYTData(data);return;}
    }
    const fmtN=n=>{if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return Math.round(n/1000)+'K';return n;};
    const data={subs:null,live:null,videos:[]};

    // Stats channel (abonnés + status live) — 3 unités seulement
    const chanR=await fetch('/youtube');
    const chanD=await chanR.json();
    if(chanD.items&&chanD.items[0]){
      const ch=chanD.items[0];
      const n=parseInt(ch.statistics?.subscriberCount||0);
      data.subs=fmtN(n);
      // Détecter live via snippet.liveBroadcastContent
      if(ch.snippet?.liveBroadcastContent==='live') data.live=ch.snippet?.title||'En live';
    }

    // Vidéos récentes — 100 unités (mis en cache 1h)
    const vR=await fetch('/youtube?type=videos');
    if(vR.ok){
      const vD=await vR.json();
      if(vD.items&&vD.items.length>0){
        const fixTitle=t=>t.replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&quot;/g,'"');
        const fmt=dt=>new Date(dt).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
        const ids=vD.items.slice(0,3).map(i=>i.id?.videoId).filter(Boolean).join(',');
        let statsMap={};
        if(ids){
          const sR=await fetch('/youtube?type=videostats&ids='+ids);
          if(sR.ok){const sD=await sR.json();if(sD.items)sD.items.forEach(s=>statsMap[s.id]=s.statistics);}
        }
        vD.items.slice(0,3).forEach((item)=>{
          if(!item.id?.videoId)return;
          const vid=item.id.videoId;
          const stats=statsMap[vid]||{};
          const n=parseInt(stats.viewCount||0);
          const views=n>=1000000?(n/1000000).toFixed(1)+'M vues':n>=1000?Math.round(n/1000)+'K vues':n+' vues';
          data.videos.push({id:vid,title:fixTitle(item.snippet.title),meta:views+' · '+fmt(item.snippet.publishedAt)});
        });
      }
    }

    localStorage.setItem(CACHE_KEY,JSON.stringify({data,timestamp:Date.now(),videoId:CONFIG.LATEST_VIDEO_ID}));
    applyYTData(data);
  }catch(e){console.error('YT error',e);}
}

function applyYTData(data){
  // Utiliser LATEST_VIDEO_ID si défini, sinon prendre le premier de l'API
  const manualId = CONFIG.LATEST_VIDEO_ID;
  let videoId = null;
  let videoTitle = null;
  let videoMeta = null;

  if(manualId){
    videoId = manualId;
    // Chercher le titre dans les données API si disponible
    const found = data.videos?.find(v => v.id === manualId);
    if(found){ videoTitle = found.title; videoMeta = found.meta; }
  } else if(data.videos&&data.videos.length>0){
    videoId = data.videos[0].id;
    videoTitle = data.videos[0].title;
    videoMeta = data.videos[0].meta;
  }

  if(videoId){
    const link=document.getElementById('last-video-link');
    const btn=document.getElementById('last-video-btn');
    const thumb=document.getElementById('last-video-thumb');
    const title=document.getElementById('last-video-title');
    const meta=document.getElementById('last-video-meta');
    const url='https://www.youtube.com/watch?v='+videoId;
    if(link)link.href=url;
    if(btn)btn.href=url;
    if(thumb)thumb.style.backgroundImage='url(https://img.youtube.com/vi/'+videoId+'/maxresdefault.jpg)';
    if(title&&videoTitle)title.textContent=videoTitle;
    if(meta&&videoMeta)meta.textContent=videoMeta;
    // Si titre ou meta manquants, les récupérer via l'API (snippet + statistics)
    if(!videoTitle||!videoMeta){
      fetch('/youtube?type=videostats&ids='+videoId).then(r=>r.json()).then(d=>{
        if(d.items&&d.items[0]){
          const item=d.items[0];
          const snippet=item.snippet||{};
          const stats=item.statistics||{};
          if(title&&snippet.title) title.textContent=snippet.title;
          const n=parseInt(stats.viewCount||0);
          const views=n>=1000000?(n/1000000).toFixed(1)+'M vues':n>=1000?Math.round(n/1000)+'K vues':n+' vues';
          const date=snippet.publishedAt?new Date(snippet.publishedAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';
          if(meta) meta.textContent=views+(date?' · '+date:'');
        }
      });
    }
  }
  if(data.subs){const el=document.getElementById('yt-subs');if(el)el.textContent=data.subs;}
  if(data.live){
    const badge=document.getElementById('yt-status-badge');
    if(badge){badge.textContent='En stream';badge.className='status-badge status-live';}
    const title=document.getElementById('yt-live-title');
    if(title)title.textContent=data.live;
    document.getElementById('hero-live').style.display='inline-flex';
  }
  data.videos.forEach((v,i)=>{
    const n=i+1;
    const card=document.getElementById('vid'+n);
    if(card)card.href='https://www.youtube.com/watch?v='+v.id;
    const bg=document.getElementById('vid'+n+'-thumb-bg');
    if(bg){bg.style.backgroundImage='url(https://img.youtube.com/vi/'+v.id+'/hqdefault.jpg)';bg.style.backgroundSize='cover';bg.style.backgroundPosition='center';}
    const title=document.getElementById('vid'+n+'-title');
    if(title)title.textContent=v.title;
    const meta=document.getElementById('vid'+n+'-meta');
    if(meta)meta.textContent=v.meta;
  });
}

// Injection du dernier Short YouTube
(function(){
  const iframe = document.getElementById('last-short-iframe');
  const btn    = document.getElementById('last-short-btn');
  const title  = document.getElementById('last-short-title');
  const meta   = document.getElementById('last-short-meta');

  if(!CONFIG.LATEST_SHORT_ID) return;

  const videoUrl = 'https://www.youtube.com/shorts/' + CONFIG.LATEST_SHORT_ID;
  const embedUrl = 'https://www.youtube.com/embed/' + CONFIG.LATEST_SHORT_ID + '?rel=0&modestbranding=1';

  if(iframe) iframe.src = embedUrl;
  if(btn)    btn.href   = videoUrl;
  if(title)  title.textContent = CONFIG.LATEST_SHORT_TITLE || '—';
  if(meta && CONFIG.LATEST_SHORT_META) meta.textContent = CONFIG.LATEST_SHORT_META;

  // Récupérer les stats via l'API si pas de meta défini
  if(meta && !CONFIG.LATEST_SHORT_META){
    fetch('/youtube?type=videostats&ids=' + CONFIG.LATEST_SHORT_ID).then(r=>r.json()).then(d=>{
      if(d.items && d.items[0]){
        const item = d.items[0];
        const snippet = item.snippet || {};
        const stats   = item.statistics || {};
        if(title && snippet.title) title.textContent = snippet.title;
        const n = parseInt(stats.viewCount || 0);
        const views = n>=1000000?(n/1000000).toFixed(1)+'M vues':n>=1000?Math.round(n/1000)+'K vues':n+' vues';
        const date = snippet.publishedAt ? new Date(snippet.publishedAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '';
        if(meta) meta.textContent = views + (date ? ' · ' + date : '');
      }
    });
  }
})();

    const body     = document.getElementById(targetId);
    const chevron  = header.querySelector('.accordion-chevron');
    if(!body) return;

    header.addEventListener('click', function(){
      const isOpen = body.style.maxHeight && body.style.maxHeight !== '0px';
      if(isOpen){
        body.style.maxHeight = '0px';
        chevron.style.transform = 'rotate(0deg)';
        chevron.style.color = 'rgba(240,237,230,0.3)';
      } else {
        body.style.maxHeight = body.scrollHeight + 'px';
        chevron.style.transform = 'rotate(180deg)';
        chevron.style.color = 'var(--accent)';
        // Recalculate after images/embeds load
        setTimeout(()=>{ body.style.maxHeight = body.scrollHeight + 'px'; }, 400);
      }
    });
  });

  // Ouvrir la section ciblée par un lien nav (#derniere-video etc.)
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click', function(){
      const target = document.querySelector(a.getAttribute('href'));
      if(!target) return;
      const body = target.querySelector('.accordion-body');
      const chevron = target.querySelector('.accordion-chevron');
      if(body && (!body.style.maxHeight || body.style.maxHeight === '0px')){
        body.style.maxHeight = body.scrollHeight + 'px';
        if(chevron){ chevron.style.transform='rotate(180deg)'; chevron.style.color='var(--accent)'; }
        setTimeout(()=>{ body.style.maxHeight = body.scrollHeight + 'px'; }, 400);
      }
    });
  });
})();

checkTwitch();
loadYT();
setInterval(checkTwitch, 60000);
</script>
</body></html>
